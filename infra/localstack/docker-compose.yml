# docker-compose.yml
#
# LocalStack container for local AWS emulation in e2e tests.
# Provides: Lambda, Secrets Manager, API Gateway REST, IAM.
#
# Usage:
#   docker compose -f infra/localstack/docker-compose.yml up -d --wait
#
# The init hook at infra/localstack/seed.sh seeds Secrets Manager
# secrets after LocalStack reaches the "ready" state.

services:
    localstack:
        image: localstack/localstack:latest
        container_name: localstack-main
        ports:
            - '4566:4566'
        environment:
            SERVICES: lambda,secretsmanager,apigateway,iam
            DEFAULT_REGION: us-east-1
            LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN}
            LAMBDA_EXECUTOR: docker
            LAMBDA_DOCKER_NETWORK: bridge
            DEBUG: 0
        volumes:
            - localstack-cache:/var/lib/localstack
            - /var/run/docker.sock:/var/run/docker.sock
            - ./seed.sh:/etc/localstack/init/ready.d/seed.sh
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'curl -sf http://localhost:4566/_localstack/health | grep -q running',
                ]
            interval: 3s
            timeout: 3s
            retries: 20
        restart: unless-stopped

volumes:
    localstack-cache:
        name: armoury-localstack-cache
