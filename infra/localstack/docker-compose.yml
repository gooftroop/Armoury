# docker-compose.yml
#
# LocalStack container for local AWS emulation in e2e tests.
# Provides: SSM, Secrets Manager, API Gateway REST, IAM.
#
# Usage:
#   docker compose -f infra/localstack/docker-compose.yml up -d --wait
#
# The init hook at infra/localstack/seed.sh seeds Secrets Manager
# secrets after LocalStack reaches the "ready" state.

services:
    localstack:
        image: localstack/localstack:4.4.0
        container_name: localstack-main
        ports:
            - '4566:4566'
        environment:
            SERVICES: ssm,secretsmanager,apigateway,iam,lambda
            LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN:-}
            LAMBDA_DOCKER_NETWORK: ${COMPOSE_PROJECT_NAME:-localstack}_default
            DEBUG: 0
        volumes:
            - localstack-cache:/var/lib/localstack
            - /var/run/docker.sock:/var/run/docker.sock
            - ./seed.sh:/etc/localstack/init/ready.d/seed.sh
            - ./services.json:/etc/localstack/init/ready.d/services.json
        healthcheck:
            test: ['CMD-SHELL', 'curl -sf http://localhost:4566/_localstack/health | grep -q available']
            interval: 3s
            timeout: 3s
            retries: 20
        restart: unless-stopped

volumes:
    localstack-cache:
        name: armoury-localstack-cache
