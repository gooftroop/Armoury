# Skip onboarding subflow — dismisses any first-run onboarding screens.
#
# Called via `runFlow:` after login when testing flows that assume
# onboarding is already complete.
#
# @requirements
# - REQ-MAESTRO-ONBOARD-01: Dismiss onboarding screens if present
# - REQ-MAESTRO-ONBOARD-02: No-op gracefully if onboarding was already dismissed
appId: com.armoury.mobile
---
# Tap "Skip" if the onboarding overlay is present.
# The `optional: true` flag means this step won't fail if the element
# isn't visible (e.g., returning users who already completed onboarding).
- tapOn:
    id: "onboarding-skip-button"
    optional: true
# Wait briefly for any transition to settle
- waitForAnimationToEnd
