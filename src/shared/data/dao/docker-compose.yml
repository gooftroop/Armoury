services:
    dao-test-db:
        image: postgres:16-alpine
        container_name: armoury-dao-test-db
        ports:
            - '5436:5432'
        environment:
            POSTGRES_DB: armoury_dsql_test
            POSTGRES_USER: armoury
            POSTGRES_PASSWORD: armoury_local
        volumes:
            - dao_test_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U armoury -d armoury_dsql_test']
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    dao_test_data:
        name: armoury-dao-test-data
