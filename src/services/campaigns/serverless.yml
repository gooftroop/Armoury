service: armoury-campaigns

params:
    production:
        environment: production
    default:
        environment: sandbox

provider:
    name: aws
    runtime: nodejs22.x
    architecture: arm64
    stage: ${opt:stage, 'dev'}
    region: ${opt:region, 'us-east-1'}
    memorySize: 256
    timeout: 29
    environment:
        DSQL_ENDPOINT_PARAM: ${env:DSQL_ENDPOINT_PARAM, '/armoury/${self:provider.stage}/campaigns/dsql-cluster-endpoint'}
        NODE_OPTIONS: '--enable-source-maps --import ./src/instrument.js'
        SENTRY_DSN: ${env:SENTRY_DSN}
        SENTRY_RELEASE: ${env:SENTRY_RELEASE}
        SENTRY_ENVIRONMENT: ${self:provider.stage}
        DB_SCHEMA: ${env:DB_SCHEMA, 'public'}
    iam:
        role:
            statements:
                - Effect: Allow
                  Action:
                      - dsql:DbConnectAdmin
                  Resource: 'arn:aws:dsql:${self:provider.region}:${aws:accountId}:cluster/*'
                - Effect: Allow
                  Action:
                      - ssm:GetParameter
                  Resource: 'arn:aws:ssm:${self:provider.region}:${aws:accountId}:parameter/armoury/${self:provider.stage}/*'
    logs:
        restApi: true

build:
    esbuild:
        bundle: true
        minify: true
        sourcemap:
            enabled: true
            setNodeOptions: false
        target: es2022
        platform: node
        format: esm
        mainFields:
            - module
            - main
        banner:
            js: "import { createRequire } from 'module'; const require = createRequire(import.meta.url);"
        external:
            - '@aws-sdk/dsql-signer'
            - '@aws-sdk/client-ssm'
            - pg

plugins:
    - serverless-offline

custom:
    serverless-offline:
        httpPort: 3000
        lambdaPort: 3002
        noPrependStageInUrl: true

functions:
    campaigns:
        handler: src/handler.handler
        events:
            - http:
                  path: /campaigns
                  method: ANY
                  cors: true
                  authorizer:
                      type: token
                      arn: ${param:authorizerArn}
            - http:
                  path: /campaigns/{id}
                  method: ANY
                  cors: true
                  authorizer:
                      type: token
                      arn: ${param:authorizerArn}
            - http:
                  path: /campaigns/{id}/participants
                  method: ANY
                  cors: true
                  authorizer:
                      type: token
                      arn: ${param:authorizerArn}
            - http:
                  path: /campaigns/{id}/participants/{pid}
                  method: ANY
                  cors: true
                  authorizer:
                      type: token
                      arn: ${param:authorizerArn}

resources:
    Resources:
        GatewayResponseDefault4XX:
            Type: AWS::ApiGateway::GatewayResponse
            Properties:
                RestApiId:
                    Ref: ApiGatewayRestApi
                ResponseType: DEFAULT_4XX
                ResponseParameters:
                    gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
                    gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
                    gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
        GatewayResponseDefault5XX:
            Type: AWS::ApiGateway::GatewayResponse
            Properties:
                RestApiId:
                    Ref: ApiGatewayRestApi
                ResponseType: DEFAULT_5XX
                ResponseParameters:
                    gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
                    gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
                    gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
        CampaignsLogGroup:
            Type: AWS::Logs::LogGroup
            Properties:
                LogGroupName: !Sub '/aws/lambda/armoury-campaigns-${self:provider.stage}'
                RetentionInDays: 14
        CampaignsLogDrainSubscriptionFilter:
            Type: AWS::Logs::SubscriptionFilter
            DependsOn: CampaignsLogGroup
            Properties:
                LogGroupName: !Sub '/aws/lambda/armoury-campaigns-${self:provider.stage}'
                FilterPattern: ''
                DestinationArn: !Sub '{{resolve:ssm:/armoury/${param:environment}/log-drain/lambda-arn}}'
