services:
    campaigns-db:
        image: postgres:16-alpine
        container_name: armoury-campaigns-db
        ports:
            - '5435:5432'
        environment:
            POSTGRES_DB: armoury_campaigns
            POSTGRES_USER: armoury
            POSTGRES_PASSWORD: armoury_local
        volumes:
            - campaigns_data:/var/lib/postgresql/data
            - ./__fixtures__/seed.sql:/docker-entrypoint-initdb.d/seed.sql
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U armoury -d armoury_campaigns']
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    campaigns_data:
        name: armoury-campaigns-data
