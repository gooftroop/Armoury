service: armoury-friends

params:
    production:
        environment: production
    default:
        environment: sandbox

provider:
    name: aws
    runtime: nodejs22.x
    architecture: arm64
    stage: ${opt:stage, 'dev'}
    region: ${opt:region, 'us-east-1'}
    memorySize: 256
    timeout: 29
    environment:
        DSQL_ENDPOINT_PARAM: ${env:DSQL_ENDPOINT_PARAM, '/armoury/${self:provider.stage}/friends/dsql-cluster-endpoint'}
        NODE_OPTIONS: '--enable-source-maps --import ./src/instrument.js'
        SENTRY_DSN: ${env:SENTRY_DSN}
        SENTRY_RELEASE: ${env:SENTRY_RELEASE}
        SENTRY_ENVIRONMENT: ${self:provider.stage}
        DB_SCHEMA: ${env:DB_SCHEMA, 'public'}
    iam:
        role:
            statements:
                - Effect: Allow
                  Action:
                      - dsql:DbConnectAdmin
                  Resource: 'arn:aws:dsql:${self:provider.region}:${aws:accountId}:cluster/*'
                - Effect: Allow
                  Action:
                      - ssm:GetParameter
                  Resource: 'arn:aws:ssm:${self:provider.region}:${aws:accountId}:parameter/armoury/${self:provider.stage}/*'
                - Effect: Allow
                  Action:
                      - execute-api:ManageConnections
                  Resource: 'arn:aws:execute-api:*:*:*/@connections/*'
    logs:
        restApi: true

build:
    esbuild:
        bundle: true
        minify: true
        sourcemap:
            enabled: true
            setNodeOptions: false
        target: es2022
        platform: node
        format: esm
        mainFields:
            - module
            - main
        banner:
            js: "import { createRequire } from 'module'; const require = createRequire(import.meta.url);"
        external:
            - '@aws-sdk/dsql-signer'
            - '@aws-sdk/client-ssm'
            - '@aws-sdk/client-apigatewaymanagementapi'
            - pg

plugins:
    - serverless-offline

custom:
    serverless-offline:
        httpPort: 3004
        websocketPort: 3005
        lambdaPort: 3006
        noPrependStageInUrl: true

functions:
    friends:
        handler: src/handler.handler
        events:
            - http:
                  path: /friends
                  method: ANY
                  cors: true
                  authorizer:
                      type: token
                      arn: ${param:authorizerArn}
            - http:
                  path: /friends/{id}
                  method: ANY
                  cors: true
                  authorizer:
                      type: token
                      arn: ${param:authorizerArn}
    friendsWebsocket:
        handler: src/ws-handler.handler
        events:
            - websocket:
                  route: $connect
                  authorizer:
                      name: auth
                      identitySource: route.request.querystring.token
                      arn: ${param:authorizerArn}
            - websocket:
                  route: $disconnect
            - websocket:
                  route: $default

resources:
    Resources:
        GatewayResponseDefault4XX:
            Type: AWS::ApiGateway::GatewayResponse
            Properties:
                RestApiId:
                    Ref: ApiGatewayRestApi
                ResponseType: DEFAULT_4XX
                ResponseParameters:
                    gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
                    gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
                    gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
        GatewayResponseDefault5XX:
            Type: AWS::ApiGateway::GatewayResponse
            Properties:
                RestApiId:
                    Ref: ApiGatewayRestApi
                ResponseType: DEFAULT_5XX
                ResponseParameters:
                    gatewayresponse.header.Access-Control-Allow-Origin: "'*'"
                    gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
                    gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
        FriendsLogGroup:
            Type: AWS::Logs::LogGroup
            Properties:
                LogGroupName: !Sub '/aws/lambda/armoury-friends-${self:provider.stage}'
                RetentionInDays: 14
        FriendsLogDrainSubscriptionFilter:
            Type: AWS::Logs::SubscriptionFilter
            DependsOn: FriendsLogGroup
            Properties:
                LogGroupName: !Sub '/aws/lambda/armoury-friends-${self:provider.stage}'
                FilterPattern: ''
                DestinationArn: !Sub '{{resolve:ssm:/armoury/${param:environment}/log-drain/lambda-arn}}'
        FriendsWebsocketLogGroup:
            Type: AWS::Logs::LogGroup
            Properties:
                LogGroupName: !Sub '/aws/lambda/armoury-friends-${self:provider.stage}-friendsWebsocket'
                RetentionInDays: 14
        FriendsWebsocketLogDrainSubscriptionFilter:
            Type: AWS::Logs::SubscriptionFilter
            DependsOn: FriendsWebsocketLogGroup
            Properties:
                LogGroupName: !Sub '/aws/lambda/armoury-friends-${self:provider.stage}-friendsWebsocket'
                FilterPattern: ''
                DestinationArn: !Sub '{{resolve:ssm:/armoury/${param:environment}/log-drain/lambda-arn}}'
