service: armoury-friends

provider:
    name: aws
    runtime: nodejs22.x
    architecture: arm64
    stage: ${opt:stage, 'dev'}
    region: ${opt:region, 'us-east-1'}
    memorySize: 256
    timeout: 29
    environment:
        DSQL_ENDPOINT_PARAM: ${env:DSQL_ENDPOINT_PARAM, '/armoury/${self:provider.stage}/friends/dsql-cluster-endpoint'}
        NODE_OPTIONS: '--enable-source-maps'
        SENTRY_DSN: ${env:SENTRY_DSN, ''}
        SENTRY_ENVIRONMENT: ${self:provider.stage}
        DB_SCHEMA: ${env:DB_SCHEMA, 'public'}
    iam:
        role:
            statements:
                - Effect: Allow
                  Action:
                      - dsql:DbConnectAdmin
                  Resource: 'arn:aws:dsql:${self:provider.region}:${aws:accountId}:cluster/*'
                - Effect: Allow
                  Action:
                      - ssm:GetParameter
                  Resource: 'arn:aws:ssm:${self:provider.region}:${aws:accountId}:parameter/armoury/${self:provider.stage}/*'
                - Effect: Allow
                  Action:
                      - execute-api:ManageConnections
                  Resource: 'arn:aws:execute-api:*:*:*/@connections/*'
                - Effect: Allow
                  Action:
                      - logs:CreateLogGroup
                      - logs:CreateLogStream
                      - logs:PutLogEvents
                  Resource: 'arn:aws:logs:${self:provider.region}:${aws:accountId}:log-group:/aws/websocket/${self:service}-${self:provider.stage}:*'
    logs:
        websocket: true

build:
    esbuild:
        bundle: true
        minify: true
        sourcemap: true
        target: es2022
        platform: node
        format: esm
        mainFields:
            - module
            - main
        banner:
            js: "import { createRequire } from 'module'; const require = createRequire(import.meta.url);"
        external:
            - '@aws-sdk/dsql-signer'
            - '@aws-sdk/client-ssm'
            - '@aws-sdk/client-apigatewaymanagementapi'
            - pg

plugins:
    - serverless-offline

custom:
    serverless-offline:
        httpPort: 3004
        websocketPort: 3005
        lambdaPort: 3006
        noPrependStageInUrl: true

functions:
    friends:
        handler: src/handler.handler
        events:
            - http:
                  path: /friends
                  method: ANY
                  authorizer:
                      type: token
                      arn: ${param:authorizerArn}
            - http:
                  path: /friends/{id}
                  method: ANY
                  authorizer:
                      type: token
                      arn: ${param:authorizerArn}
    friendsWebsocket:
        handler: src/wsHandler.handler
        events:
            - websocket:
                  route: $connect
                  authorizer:
                      name: auth
                      identitySource: route.request.querystring.token
                      arn: ${param:authorizerArn}
            - websocket:
                  route: $disconnect
            - websocket:
                  route: $default
