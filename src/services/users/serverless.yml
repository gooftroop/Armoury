service: armoury-users

params:
    production:
        environment: production
    default:
        environment: sandbox

provider:
    name: aws
    runtime: nodejs22.x
    architecture: arm64
    stage: ${opt:stage, 'dev'}
    region: ${opt:region, 'us-east-1'}
    memorySize: 256
    timeout: 29
    environment:
        DSQL_ENDPOINT_PARAM: ${env:DSQL_ENDPOINT_PARAM, '/armoury/${param:environment}/users/dsql-cluster-endpoint'}
        NODE_OPTIONS: '--enable-source-maps'
        SENTRY_DSN: ${ssm:/armoury/${param:environment}/users/sentry-dsn}
        SENTRY_RELEASE: ${env:SENTRY_RELEASE, ''}
        SENTRY_ENVIRONMENT: ${self:provider.stage}
        DB_SCHEMA: ${env:DB_SCHEMA, 'public'}
        ALLOWED_ORIGIN: ${self:custom.allowedOrigin}
    iam:
        role:
            statements:
                - Effect: Allow
                  Action:
                      - dsql:DbConnectAdmin
                  Resource: 'arn:aws:dsql:${self:provider.region}:${aws:accountId}:cluster/*'
                - Effect: Allow
                  Action:
                      - ssm:GetParameter
                  Resource: 'arn:aws:ssm:${self:provider.region}:${aws:accountId}:parameter/armoury/${param:environment}/*'
    httpApi:
        authorizers:
            auth0Jwt:
                type: jwt
                identitySource: $request.header.Authorization
                issuerUrl: https://${env:AUTH0_DOMAIN}/
                audience:
                    - ${env:AUTH0_AUDIENCE}
        cors:
            allowedOrigins:
                - ${self:custom.allowedOrigin}
            allowedHeaders:
                - Content-Type
                - Authorization
            allowedMethods:
                - GET
                - POST
                - PUT
                - PATCH
                - DELETE
                - OPTIONS
    logs:
        httpApi: true

build:
    esbuild:
        bundle: true
        minify: true
        sourcemap:
            enabled: true
            setNodeOptions: false
        target: es2022
        platform: node
        format: esm
        mainFields:
            - module
            - main
        banner:
            js: "import { createRequire } from 'module'; const require = createRequire(import.meta.url);"
        external:
            - '@aws-sdk/dsql-signer'
            - '@aws-sdk/client-ssm'

plugins:
    - serverless-offline

custom:
    allowedOrigin: ${env:ALLOWED_ORIGIN, '*'}
    serverless-offline:
        httpPort: 3007
        lambdaPort: 3009
        noPrependStageInUrl: true

functions:
    users:
        handler: src/handler.handler
        events:
            - httpApi:
                  path: /
                  method: GET
                  authorizer:
                      name: auth0Jwt
            - httpApi:
                  path: /
                  method: POST
                  authorizer:
                      name: auth0Jwt
            - httpApi:
                  path: /{id}
                  method: GET
                  authorizer:
                      name: auth0Jwt
            - httpApi:
                  path: /{id}
                  method: PUT
                  authorizer:
                      name: auth0Jwt
            - httpApi:
                  path: /{id}
                  method: DELETE
                  authorizer:
                      name: auth0Jwt
            - httpApi:
                  path: /upsert
                  method: POST
                  authorizer:
                      name: auth0Jwt
            - httpApi:
                  path: /{id}/account
                  method: GET
                  authorizer:
                      name: auth0Jwt
            - httpApi:
                  path: /{id}/account
                  method: POST
                  authorizer:
                      name: auth0Jwt
            - httpApi:
                  path: /{id}/account
                  method: PUT
                  authorizer:
                      name: auth0Jwt
            - httpApi:
                  path: /{id}/account
                  method: DELETE
                  authorizer:
                      name: auth0Jwt

resources:
    Resources:
        UsersLogGroup:
            Type: AWS::Logs::LogGroup
            Properties:
                LogGroupName: !Sub '/aws/lambda/armoury-users-${self:provider.stage}-users'
                RetentionInDays: 14
        UsersLogDrainSubscriptionFilter:
            Type: AWS::Logs::SubscriptionFilter
            DependsOn: UsersLogGroup
            Properties:
                LogGroupName: !Sub '/aws/lambda/armoury-users-${self:provider.stage}-users'
                FilterPattern: ''
                DestinationArn: !Sub '{{resolve:ssm:/armoury/${param:environment}/log-drain/lambda-arn}}'
