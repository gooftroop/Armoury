service: armoury-authorizer

params:
    production:
        environment: production
    default:
        environment: sandbox

provider:
    name: aws
    runtime: nodejs22.x
    architecture: arm64
    stage: ${opt:stage, 'dev'}
    region: ${opt:region, 'us-east-1'}
    memorySize: 128
    timeout: 10
    environment:
        AUTH0_DOMAIN: ${env:AUTH0_DOMAIN, ''}
        AUTH0_AUDIENCE: ${env:AUTH0_AUDIENCE, ''}
        NODE_OPTIONS: '--enable-source-maps'
        SENTRY_DSN: ${env:SENTRY_DSN, ''}
        SENTRY_RELEASE: ${env:SENTRY_RELEASE, ''}
        SENTRY_ENVIRONMENT: ${self:provider.stage}

build:
    esbuild:
        bundle: true
        minify: true
        sourcemap:
            enabled: true
            setNodeOptions: false
        target: es2022
        platform: node
        format: esm
        mainFields:
            - module
            - main
plugins:
    - serverless-offline

custom:
    serverless-offline:
        httpPort: 3000
        lambdaPort: 3002
        noPrependStageInUrl: true

# CloudFormation output consumed by serverless-compose.yml to wire the authorizer
# into downstream services (campaigns, matches) via ${authorizer.AuthorizerArn}.
resources:
    Outputs:
        AuthorizerArn:
            Value: !GetAtt AuthorizerLambdaFunction.Arn
            Description: ARN of the authorizer Lambda function for cross-service reference
    Resources:
        AuthorizerLogGroup:
            Type: AWS::Logs::LogGroup
            Properties:
                LogGroupName: !Sub '/aws/lambda/armoury-authorizer-${self:provider.stage}'
                RetentionInDays: 14
        AuthorizerLogDrainSubscriptionFilter:
            Type: AWS::Logs::SubscriptionFilter
            DependsOn: AuthorizerLogGroup
            Properties:
                LogGroupName: !Sub '/aws/lambda/armoury-authorizer-${self:provider.stage}'
                FilterPattern: ''
                DestinationArn: !Sub '{{resolve:ssm:/armoury/${param:environment}/log-drain/lambda-arn}}'

functions:
    authorizer:
        handler: src/handler.handler
