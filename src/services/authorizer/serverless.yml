service: armoury-authorizer

provider:
    name: aws
    runtime: nodejs22.x
    architecture: arm64
    stage: ${opt:stage, 'dev'}
    region: ${opt:region, 'us-east-1'}
    memorySize: 128
    timeout: 10
    environment:
        AUTH0_DOMAIN: ${env:AUTH0_DOMAIN, ''}
        AUTH0_AUDIENCE: ${env:AUTH0_AUDIENCE, ''}
        NODE_OPTIONS: '--enable-source-maps --import ./src/instrument.js'
        SENTRY_DSN: ${env:SENTRY_DSN}
        SENTRY_RELEASE: ${env:SENTRY_RELEASE}
        SENTRY_ENVIRONMENT: ${self:provider.stage}

build:
    esbuild:
        bundle: true
        minify: true
        sourcemap: true
        target: es2022
        platform: node
        format: esm
        mainFields:
            - module
            - main
plugins:
    - serverless-offline

custom:
    serverless-offline:
        httpPort: 3000
        lambdaPort: 3002
        noPrependStageInUrl: true

# CloudFormation output consumed by serverless-compose.yml to wire the authorizer
# into downstream services (campaigns, matches) via ${authorizer.AuthorizerArn}.
resources:
    Outputs:
        AuthorizerArn:
            Value: !GetAtt AuthorizerLambdaFunction.Arn
            Description: ARN of the authorizer Lambda function for cross-service reference

functions:
    authorizer:
        handler: src/handler.handler
