# Army list (Forge) navigation flow.
#
# Validates post-login list visibility, navigation into an army detail screen,
# and successful return back to the list.
#
# @requirements
# - REQ-MAESTRO-ARMY-LIST-01: Authenticate via common/login.yaml
# - REQ-MAESTRO-ARMY-LIST-02: Confirm My Armies heading and list screen are visible
# - REQ-MAESTRO-ARMY-LIST-03: Open an army card and verify detail screen appears
# - REQ-MAESTRO-ARMY-LIST-04: Navigate back and confirm list remains visible
appId: com.armoury.mobile
env:
    TEST_USER_EMAIL: ${TEST_USER_EMAIL}
    TEST_USER_PASSWORD: ${TEST_USER_PASSWORD}
---
- runFlow: common/login.yaml
- assertVisible:
      id: 'army-list-screen'
      timeout: 10000
- assertVisible:
      text: 'My Armies'
      timeout: 10000
- assertVisible:
      id: 'army-list-item-.*'
      timeout: 10000
- tapOn:
      id: 'army-list-item-.*'
- assertVisible:
      id: 'army-detail-screen'
      timeout: 10000
- back
- assertVisible:
      id: 'army-list-screen'
      timeout: 10000
- assertVisible:
      id: 'army-list-item-.*'
      timeout: 10000
