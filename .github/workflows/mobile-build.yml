name: Mobile Build

on:
    pull_request:
        branches: [main]
        paths:
            - 'src/mobile/**'
            - 'src/shared/**'
            - 'src/systems/**'
    push:
        branches: [main]
        paths:
            - 'src/mobile/**'
            - 'src/shared/**'
            - 'src/systems/**'
    workflow_dispatch:
        inputs:
            profile:
                description: 'EAS Build profile'
                required: true
                default: 'preview'
                type: choice
                options:
                    - development
                    - preview
                    - production
            platform:
                description: 'Target platform'
                required: true
                default: 'all'
                type: choice
                options:
                    - all
                    - ios
                    - android

permissions:
    contents: read

concurrency:
    group: mobile-build-${{ github.ref }}
    cancel-in-progress: true

jobs:
    ci:
        name: Mobile CI
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
            - run: npm ci
            - run: npx turbo run typecheck lint test --filter=@armoury/mobile

    build-preview:
        name: Build Preview
        if: github.event_name == 'pull_request'
        needs: [ci]
        runs-on: ubuntu-latest
        timeout-minutes: 60
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
            - uses: expo/expo-github-action@v8
              with:
                  eas-version: latest
                  token: ${{ secrets.EXPO_TOKEN }}
            - run: npm ci
            - name: Build preview
              run: eas build --profile preview --platform all --non-interactive
              working-directory: src/mobile

    build-production:
        name: Build Production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        needs: [ci]
        runs-on: ubuntu-latest
        timeout-minutes: 60
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
            - uses: expo/expo-github-action@v8
              with:
                  eas-version: latest
                  token: ${{ secrets.EXPO_TOKEN }}
            - run: npm ci
            - name: Build production
              run: eas build --profile production --platform all --non-interactive
              working-directory: src/mobile

    build-manual:
        name: Build (Manual)
        if: github.event_name == 'workflow_dispatch'
        needs: [ci]
        runs-on: ubuntu-latest
        timeout-minutes: 60
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
            - uses: expo/expo-github-action@v8
              with:
                  eas-version: latest
                  token: ${{ secrets.EXPO_TOKEN }}
            - run: npm ci
            - name: Build
              run: eas build --profile ${{ inputs.profile }} --platform ${{ inputs.platform }} --non-interactive
              working-directory: src/mobile
