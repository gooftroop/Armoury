name: Cleanup Service Sandbox

on:
    workflow_call:
        inputs:
            working-directory:
                description: 'Path to the service directory (e.g. src/services/campaigns)'
                required: true
                type: string
            has-migrations:
                description: 'Whether the service has database migrations (and thus a PR schema to drop)'
                required: false
                type: boolean
                default: false
            service-short-name:
                description: 'Short service name used for routing (e.g. users, campaigns, matches, friends). Empty = skip routing rule cleanup.'
                required: false
                type: string
                default: ''
            has-websocket:
                description: 'Whether the service has a WebSocket API mapping to clean up'
                required: false
                type: boolean
                default: false
            routing-rule-priority:
                description: 'The routing rule priority used during deploy (needed to find the rule to delete)'
                required: false
                type: number
                default: 0
            has-secrets:
                description: 'Whether the service has Secrets Manager secrets to clean up (e.g. authorizer)'
                required: false
                type: boolean
                default: false
            has-rest-api-logs:
                description: 'Whether the service has API Gateway access logs to clean up'
                required: false
                type: boolean
                default: false

jobs:
    teardown:
        name: Remove Sandbox Stage
        if: vars.DEPLOY_ENABLED == 'true'
        runs-on: ubuntu-latest
        environment: sandbox
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc
                  cache: npm

            - run: npm ci

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v6
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

            - name: Fetch DSQL config from SSM
              if: inputs.has-migrations
              run: |
                  SERVICE_SHORT_NAME=$(basename "${{ inputs.working-directory }}")
                  DSQL_CLUSTER_ENDPOINT=$(aws ssm get-parameter \
                    --name "/armoury/sandbox/${SERVICE_SHORT_NAME}/dsql-cluster-endpoint" \
                    --query 'Parameter.Value' --output text)
                  echo "DSQL_CLUSTER_ENDPOINT=${DSQL_CLUSTER_ENDPOINT}" >> "${GITHUB_ENV}"
                  echo "DSQL_REGION=${{ vars.AWS_REGION || 'us-east-1' }}" >> "${GITHUB_ENV}"

            - name: Drop PR schema
              if: inputs.has-migrations
              env:
                  DB_SCHEMA: ${{ format('pr_{0}', github.event.pull_request.number) }}
              run: node --import=tsx src/shared/e2e/src/dbSchema.ts drop "${DB_SCHEMA}"

            - name: Install Serverless Framework
              run: npm install -g serverless

            - name: Remove stage
              working-directory: ${{ inputs.working-directory }}
              env:
                  SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
              run: serverless remove --stage pr-${{ github.event.pull_request.number }} --param="authorizerArn=arn:aws:lambda:us-east-1:000000000000:function:cleanup-placeholder"

            - name: Delete HTTP API domain mapping
              if: inputs.service-short-name != ''
              env:
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  SERVICE_SHORT_NAME: ${{ inputs.service-short-name }}
                  PR_DOMAIN: ${{ format('pr-{0}.api.sandbox.armoury-app.com', github.event.pull_request.number) }}
              run: |
                  # Delete the API mapping for this service on the per-PR domain
                  MAPPING_ID=$(aws apigatewayv2 get-api-mappings \
                    --domain-name "${PR_DOMAIN}" \
                    --query "Items[?ApiMappingKey=='${SERVICE_SHORT_NAME}'].ApiMappingId" \
                    --output text 2>/dev/null || true)

                  if [ -n "${MAPPING_ID}" ] && [ "${MAPPING_ID}" != "None" ]; then
                    echo "Deleting API mapping ${MAPPING_ID} for ${PR_DOMAIN}/${SERVICE_SHORT_NAME}"
                    aws apigatewayv2 delete-api-mapping \
                      --domain-name "${PR_DOMAIN}" \
                      --api-mapping-id "${MAPPING_ID}"
                    echo "API mapping deleted."
                  else
                    echo "No API mapping found for ${PR_DOMAIN}/${SERVICE_SHORT_NAME} — skipping."
                  fi

                  # If no more API mappings remain on this PR domain, delete the domain itself.
                  # This cleans up the per-PR domain after the last service is torn down.
                  REMAINING=$(aws apigatewayv2 get-api-mappings \
                    --domain-name "${PR_DOMAIN}" \
                    --query 'Items | length(@)' \
                    --output text 2>/dev/null || echo "0")

                  if [ "${REMAINING}" = "0" ] || [ "${REMAINING}" = "None" ]; then
                    echo "No remaining mappings on ${PR_DOMAIN} — deleting domain"
                    aws apigatewayv2 delete-domain-name --domain-name "${PR_DOMAIN}" 2>/dev/null || true
                    echo "Domain deleted."
                  else
                    echo "${REMAINING} mapping(s) still on ${PR_DOMAIN} — keeping domain."
                  fi

            - name: Delete WS API mapping
              if: inputs.has-websocket
              env:
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  SERVICE_SHORT_NAME: ${{ inputs.service-short-name }}
                  WS_DOMAIN: 'ws-sandbox.armoury-app.com'
              run: |
                  # Find and delete the WS API mapping for this PR+service (keyed by pr-{N}-{service})
                  MAPPING_ID=$(aws apigatewayv2 get-api-mappings \
                    --domain-name "${WS_DOMAIN}" \
                    --query "Items[?ApiMappingKey=='pr-${PR_NUMBER}-${SERVICE_SHORT_NAME}'].ApiMappingId" \
                    --output text 2>/dev/null || true)

                  if [ -n "${MAPPING_ID}" ] && [ "${MAPPING_ID}" != "None" ]; then
                    echo "Deleting WS API mapping ${MAPPING_ID} for pr-${PR_NUMBER}-${SERVICE_SHORT_NAME}"
                    aws apigatewayv2 delete-api-mapping \
                      --domain-name "${WS_DOMAIN}" \
                      --api-mapping-id "${MAPPING_ID}"
                    echo "WS API mapping deleted."
                  else
                    echo "No WS API mapping found for pr-${PR_NUMBER}-${SERVICE_SHORT_NAME} — skipping."
                  fi

            - name: Delete CloudWatch Lambda log groups
              env:
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  SERVICE_NAME: armoury-${{ inputs.service-short-name || 'authorizer' }}
              run: |
                  # Lambda log groups are auto-created by the runtime (not part of CF stack),
                  # so `serverless remove` does NOT delete them. Clean up explicitly.
                  PREFIX="/aws/lambda/${SERVICE_NAME}-pr-${PR_NUMBER}"
                  echo "Searching for log groups with prefix: ${PREFIX}"
                  LOG_GROUPS=$(aws logs describe-log-groups \
                    --log-group-name-prefix "${PREFIX}" \
                    --query 'logGroups[].logGroupName' --output text || true)

                  if [ -z "${LOG_GROUPS}" ] || [ "${LOG_GROUPS}" = "None" ]; then
                    echo "No Lambda log groups found with prefix ${PREFIX} — skipping."
                  else
                    for LG in ${LOG_GROUPS}; do
                      echo "Deleting log group: ${LG}"
                      aws logs delete-log-group --log-group-name "${LG}" || true
                    done
                    echo "Lambda log group cleanup complete."
                  fi

            - name: Delete API Gateway access log group
              if: inputs.has-rest-api-logs
              env:
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  SERVICE_NAME: armoury-${{ inputs.service-short-name }}
              run: |
                  # API Gateway access log groups follow this naming pattern
                  LOG_GROUP="/aws/api-gateway/${SERVICE_NAME}-pr-${PR_NUMBER}"
                  echo "Checking for API Gateway log group: ${LOG_GROUP}"
                  EXISTS=$(aws logs describe-log-groups \
                    --log-group-name-prefix "${LOG_GROUP}" \
                    --query "logGroups[?logGroupName=='${LOG_GROUP}'].logGroupName" \
                    --output text || true)

                  if [ -n "${EXISTS}" ] && [ "${EXISTS}" != "None" ]; then
                    echo "Deleting API Gateway log group: ${LOG_GROUP}"
                    aws logs delete-log-group --log-group-name "${LOG_GROUP}" || true
                    echo "API Gateway log group deleted."
                  else
                    echo "No API Gateway log group found at ${LOG_GROUP} — skipping."
                  fi

            - name: Delete Secrets Manager secret
              if: inputs.has-secrets
              env:
                  PR_NUMBER: ${{ github.event.pull_request.number }}
              run: |
                  SECRET_NAME="armoury/pr-${PR_NUMBER}/authorizer"
                  echo "Deleting secret: ${SECRET_NAME}"
                  aws secretsmanager delete-secret \
                    --secret-id "${SECRET_NAME}" \
                    --force-delete-without-recovery || true
                  echo "Secret deletion requested (or already absent)."
