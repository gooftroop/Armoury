name: Cleanup Service Sandbox

on:
    workflow_call:
        inputs:
            working-directory:
                description: 'Path to the service directory (e.g. src/services/campaigns)'
                required: true
                type: string
            has-migrations:
                description: 'Whether the service has database migrations (and thus a PR schema to drop)'
                required: false
                type: boolean
                default: false

jobs:
    teardown:
        name: Remove Sandbox Stage
        if: vars.DEPLOY_ENABLED == 'true'
        runs-on: ubuntu-latest
        environment: sandbox
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc
                  cache: npm

            - run: npm ci

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v6
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

            - name: Fetch DSQL config from SSM
              run: |
                  SERVICE_SHORT_NAME=$(basename "${{ inputs.working-directory }}")
                  DSQL_CLUSTER_ENDPOINT=$(aws ssm get-parameter \
                    --name "/armoury/sandbox/${SERVICE_SHORT_NAME}/dsql-cluster-endpoint" \
                    --query 'Parameter.Value' --output text)
                  echo "DSQL_CLUSTER_ENDPOINT=${DSQL_CLUSTER_ENDPOINT}" >> "${GITHUB_ENV}"
                  echo "DSQL_REGION=${{ vars.AWS_REGION || 'us-east-1' }}" >> "${GITHUB_ENV}"

            - name: Drop PR schema
              if: inputs.has-migrations
              env:
                  DB_SCHEMA: ${{ format('pr_{0}', github.event.pull_request.number) }}
              run: node --import=tsx src/services/__testing__/dbSchema.ts drop "${DB_SCHEMA}"

            - name: Install Serverless Framework
              run: npm install -g serverless

            - name: Delete custom domain
              working-directory: ${{ inputs.working-directory }}
              env:
                  SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
              run: |
                  SERVICE_SHORT_NAME=$(basename "${{ inputs.working-directory }}")
                  serverless delete_domain \
                    --stage pr-${{ github.event.pull_request.number }} \
                    --param="domainPrefix=${SERVICE_SHORT_NAME}-pr-${{ github.event.pull_request.number }}-sandbox" \
                    --param="domainName=${{ vars.DOMAIN_NAME }}" \
                    --param="certificateArn=${{ secrets.ACM_CERTIFICATE_ARN }}" \
                    --param="hostedZoneId=${{ vars.ROUTE53_HOSTED_ZONE_ID }}" \
                    --param="customDomainEnabled=true"

            - name: Remove stage
              working-directory: ${{ inputs.working-directory }}
              env:
                  SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
              run: serverless remove --stage pr-${{ github.event.pull_request.number }}
