name: Matches Sandbox Cleanup

on:
    pull_request:
        types: [closed]
        branches: [main]
        paths:
            - 'src/services/matches/**'
            - 'src/shared/**'

jobs:
    cleanup:
        uses: ./.github/workflows/_cleanup-service.yml
        with:
            working-directory: src/services/matches
        secrets: inherit
