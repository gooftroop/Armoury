name: Deploy Web

on:
    workflow_call:

jobs:
    ci:
        name: Build & Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc
                  cache: npm

            - run: npm ci

            - name: Build dependencies
              run: npx turbo run build --filter=@armoury/web^...

            - name: Typecheck
              run: npx turbo run typecheck --filter=@armoury/web

            - name: Lint
              run: npm run lint -w @armoury/web

            - name: Format check
              run: npm run format:check -w @armoury/web

            - name: Test
              run: npx turbo run test --filter=@armoury/web

    deploy-preview:
        name: Deploy Preview
        needs: ci
        if: vars.DEPLOY_ENABLED == 'true' && github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        environment: preview
        defaults:
            run:
                working-directory: src/web
        env:
            VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
            VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc
                  cache: npm

            - run: npm ci
              working-directory: .

            - name: Build dependencies
              run: npx turbo run build --filter=@armoury/web^...
              working-directory: .

            - name: Install Vercel CLI
              run: npm install -g vercel

            - name: Pull Vercel environment
              run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

            - name: Build
              run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

            - name: Deploy preview
              id: deploy
              run: echo "url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})" >> "$GITHUB_OUTPUT"

            - name: Comment PR with preview URL
              uses: actions/github-script@v8
              with:
                  script: |
                      github.rest.issues.createComment({
                          issue_number: context.issue.number,
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          body: `🚀 Preview deployed: ${{ steps.deploy.outputs.url }}`
                      });

    deploy-production:
        name: Deploy Production
        needs: ci
        if: vars.DEPLOY_ENABLED == 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        runs-on: ubuntu-latest
        environment: production
        defaults:
            run:
                working-directory: src/web
        env:
            VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
            VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc
                  cache: npm

            - run: npm ci
              working-directory: .

            - name: Build dependencies
              run: npx turbo run build --filter=@armoury/web^...
              working-directory: .

            - name: Install Vercel CLI
              run: npm install -g vercel

            - name: Pull Vercel environment
              run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

            - name: Build
              run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

            - name: Deploy production
              run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
