name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    install:
        name: Install dependencies
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc

            - name: Install dependencies (full)
              run: npm ci

            - name: Cache full dependencies
              uses: actions/cache/save@v5
              with:
                  path: |
                      node_modules
                      src/*/node_modules
                      src/*/*/node_modules
                  key: ${{ runner.os }}-node-full-${{ hashFiles('package-lock.json') }}

            - name: Install dependencies (prod-only)
              run: npm ci --omit=dev

            - name: Cache prod-only dependencies
              uses: actions/cache/save@v5
              with:
                  path: |
                      node_modules
                      src/*/node_modules
                      src/*/*/node_modules
                  key: ${{ runner.os }}-node-prod-${{ hashFiles('package-lock.json') }}

    test:
        name: Test
        runs-on: ubuntu-latest
        needs: install
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc

            - name: Restore full dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      src/*/node_modules
                      src/*/*/node_modules
                  key: ${{ runner.os }}-node-full-${{ hashFiles('package-lock.json') }}

            - name: Run tests
              run: npm run test

    lint:
        name: Lint & Format
        runs-on: ubuntu-latest
        needs: install
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc

            - name: Restore full dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      src/*/node_modules
                      src/*/*/node_modules
                  key: ${{ runner.os }}-node-full-${{ hashFiles('package-lock.json') }}

            - name: Run lint and format check
              run: npx turbo run lint format:check

    typecheck:
        name: Typecheck
        runs-on: ubuntu-latest
        needs: install
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc

            - name: Restore full dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      src/*/node_modules
                      src/*/*/node_modules
                  key: ${{ runner.os }}-node-full-${{ hashFiles('package-lock.json') }}

            - name: Run typecheck
              run: npm run typecheck

    test-e2e:
        name: E2E tests (backend)
        runs-on: ubuntu-latest
        needs: install
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc

            - name: Restore full dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      src/*/node_modules
                      src/*/*/node_modules
                  key: ${{ runner.os }}-node-full-${{ hashFiles('package-lock.json') }}

            - name: Cache Docker images
              id: docker-cache
              uses: actions/cache@v4
              with:
                  path: /tmp/docker-images
                  key: ${{ runner.os }}-docker-localstack4.4.0-postgres16alpine

            - name: Load cached Docker images
              if: steps.docker-cache.outputs.cache-hit == 'true'
              run: |
                  docker load -i /tmp/docker-images/localstack.tar
                  docker load -i /tmp/docker-images/postgres.tar

            - name: Pull and cache Docker images
              if: steps.docker-cache.outputs.cache-hit != 'true'
              run: |
                  docker pull localstack/localstack:4.4.0 &
                  docker pull postgres:16-alpine &
                  wait
                  mkdir -p /tmp/docker-images
                  docker save localstack/localstack:4.4.0 -o /tmp/docker-images/localstack.tar
                  docker save postgres:16-alpine -o /tmp/docker-images/postgres.tar

            - name: Ensure clean Docker state
              run: |
                  docker compose -f infra/localstack/docker-compose.yml down -v --remove-orphans 2>/dev/null || true
                  shopt -s nullglob
                  for f in src/services/*/docker-compose.yml src/shared/*/docker-compose.yml src/shared/*/*/docker-compose.yml; do
                      dir=$(dirname "$f")
                      docker compose -f "$f" --project-directory "$dir" down -v --remove-orphans 2>/dev/null || true
                  done
                  shopt -u nullglob

            - name: Run backend e2e tests
              run: npm run test:e2e:services && npm run test:e2e:shared

            - name: Cleanup Docker containers
              if: always()
              run: |
                  docker compose -f infra/localstack/docker-compose.yml down -v --remove-orphans 2>/dev/null || true
                  shopt -s nullglob
                  for f in src/services/*/docker-compose.yml src/shared/*/docker-compose.yml src/shared/*/*/docker-compose.yml; do
                      dir=$(dirname "$f")
                      docker compose -f "$f" --project-directory "$dir" down -v --remove-orphans 2>/dev/null || true
                  done
                  shopt -u nullglob

    test-e2e-web:
        name: Playwright E2E
        runs-on: ubuntu-latest
        needs: install
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc

            - name: Restore full dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      src/*/node_modules
                      src/*/*/node_modules
                  key: ${{ runner.os }}-node-full-${{ hashFiles('package-lock.json') }}

            - name: Get Playwright version
              id: pw-version
              run: echo "version=$(npx playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

            - name: Cache Playwright browsers
              id: pw-cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: ${{ runner.os }}-playwright-${{ steps.pw-version.outputs.version }}

            - name: Install Playwright browsers
              if: steps.pw-cache.outputs.cache-hit != 'true'
              run: npx playwright install --with-deps chromium

            - name: Install Playwright system deps
              if: steps.pw-cache.outputs.cache-hit == 'true'
              run: npx playwright install-deps chromium

            - name: Build web and dependencies
              run: npx turbo run build --filter=@armoury/web

            - name: Run Playwright e2e tests
              run: npx playwright test --config src/web/e2e/playwright.config.ts
              env:
                  CI: 'true'
                  AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
                  AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
                  AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
                  AUTH0_SECRET: ${{ secrets.AUTH0_SECRET }}
                  E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
                  E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}

            - name: Upload test artifacts
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: |
                      playwright-report/
                      test-results/
                  retention-days: 7

    build-web:
        name: Build web
        runs-on: ubuntu-latest
        needs: [install, test, test-e2e, test-e2e-web, lint, typecheck]
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc

            - name: Restore full dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      src/*/node_modules
                      src/*/*/node_modules
                  key: ${{ runner.os }}-node-full-${{ hashFiles('package-lock.json') }}

            - name: Build web and dependencies
              run: npx turbo run build --filter=@armoury/web

            - name: Cache Next.js build output
              uses: actions/cache/save@v5
              with:
                  path: src/web/.next
                  key: ${{ runner.os }}-next-${{ hashFiles('package-lock.json', 'src/web/**', 'src/shared/**') }}

    build-mobile:
        name: Build mobile
        runs-on: ubuntu-latest
        needs: [install, test, test-e2e, test-e2e-web, lint, typecheck]
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc

            - name: Restore full dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      src/*/node_modules
                      src/*/*/node_modules
                  key: ${{ runner.os }}-node-full-${{ hashFiles('package-lock.json') }}

            - name: Build mobile and dependencies
              run: npx turbo run build --filter=@armoury/mobile

    package-system-assets:
        name: Package system public assets
        runs-on: ubuntu-latest
        needs: [install, test, test-e2e, test-e2e-web, lint, typecheck]
        steps:
            - uses: actions/checkout@v6

            - name: Zip system public folders
              run: |
                  for dir in src/systems/*/src/public; do
                      system=$(basename $(dirname $(dirname "$dir")))
                      if [ -d "$dir" ] && [ "$(ls -A "$dir" 2>/dev/null | grep -v .gitkeep)" ]; then
                          (cd "$dir" && zip -r "../../../../${system}-public.zip" . -x '.gitkeep')
                          echo "Packaged ${system} public assets"
                      else
                          echo "Skipping ${system} — public folder empty"
                      fi
                  done

            - name: Upload system assets
              if: github.ref == 'refs/heads/main'
              uses: actions/upload-artifact@v7
              with:
                  name: system-public-assets
                  path: '*.zip'
                  if-no-files-found: ignore
                  retention-days: 30
