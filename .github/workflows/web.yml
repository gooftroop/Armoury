name: Web

on:
    push:
        branches: [main]
        paths:
            - 'src/web/**'
            - 'src/shared/**'
            - 'src/systems/**'
            - '.browserslistrc'
    pull_request:
        branches: [main]
        paths:
            - 'src/web/**'
            - 'src/shared/**'
            - 'src/systems/**'
            - '.browserslistrc'

concurrency:
    group: web-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    deploy:
        uses: ./.github/workflows/_deploy-web.yml
        secrets: inherit
