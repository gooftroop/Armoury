name: Deploy Service

on:
    workflow_call:
        inputs:
            service-name:
                description: 'npm workspace package name (e.g. @armoury/campaigns)'
                required: true
                type: string
            working-directory:
                description: 'Path to the service directory (e.g. src/services/campaigns)'
                required: true
                type: string
            needs-shared-build:
                description: 'Whether to build shared dependencies before CI steps'
                required: false
                type: boolean
                default: false
            has-migrations:
                description: 'Whether the service has a db:migrate script to run before deploy'
                required: false
                type: boolean
                default: false

jobs:
    ci:
        name: Build & Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc
                  cache: npm

            - run: npm ci

            - name: Build dependencies
              if: inputs.needs-shared-build
              run: npx turbo run build generate:types --filter=${{ inputs.service-name }}^...

            - name: Typecheck
              run: npx turbo run typecheck --filter=${{ inputs.service-name }}

            - name: Lint
              run: npm run lint -w ${{ inputs.service-name }}

            - name: Format check
              run: npm run format:check -w ${{ inputs.service-name }}

            - name: Test
              run: npx turbo run test --filter=${{ inputs.service-name }}

    deploy-sandbox:
        name: Deploy Sandbox
        needs: ci
        if: vars.DEPLOY_ENABLED == 'true' && github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        environment: sandbox
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc
                  cache: npm

            - run: npm ci

            - name: Build dependencies
              if: inputs.needs-shared-build
              run: npx turbo run build --filter=${{ inputs.service-name }}^...

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v6
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

            - name: Fetch DSQL config from SSM
              run: |
                  SERVICE_SHORT_NAME=$(basename "${{ inputs.working-directory }}")
                  DSQL_CLUSTER_ENDPOINT=$(aws ssm get-parameter \
                    --name "/armoury/sandbox/${SERVICE_SHORT_NAME}/dsql-cluster-endpoint" \
                    --query 'Parameter.Value' --output text)
                  echo "DSQL_CLUSTER_ENDPOINT=${DSQL_CLUSTER_ENDPOINT}" >> "${GITHUB_ENV}"
                  echo "DSQL_REGION=${{ vars.AWS_REGION || 'us-east-1' }}" >> "${GITHUB_ENV}"

            - name: Create PR schema
              if: inputs.has-migrations && github.event_name == 'pull_request'
              env:
                  DB_SCHEMA: ${{ format('pr_{0}', github.event.pull_request.number) }}
              run: node --import=tsx src/services/__testing__/dbSchema.ts create "${DB_SCHEMA}"

            - name: Generate DATABASE_URL for PR migrations
              id: db-url
              if: inputs.has-migrations && github.event_name == 'pull_request'
              env:
                  DB_SCHEMA: ${{ format('pr_{0}', github.event.pull_request.number) }}
              run: |
                  DATABASE_URL=$(node --import=tsx src/services/__testing__/dbSchema.ts url "${DB_SCHEMA}")
                  {
                    echo "DATABASE_URL<<DBURL_EOF"
                    echo "${DATABASE_URL}"
                    echo "DBURL_EOF"
                  } >> "${GITHUB_OUTPUT}"

            - name: Run migrations
              if: inputs.has-migrations
              env:
                  DB_SCHEMA: ${{ github.event_name == 'pull_request' && format('pr_{0}', github.event.pull_request.number) || 'public' }}
                  DATABASE_URL: ${{ steps.db-url.outputs.DATABASE_URL || '' }}
              run: npm run db:migrate -w ${{ inputs.service-name }}

            - name: Install Serverless Framework
              run: npm install -g serverless

            - name: Deploy
              working-directory: ${{ inputs.working-directory }}
              env:
                  DB_SCHEMA: ${{ format('pr_{0}', github.event.pull_request.number) }}
                  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
              run: |
                  SERVICE_SHORT_NAME=$(basename "${{ inputs.working-directory }}")
                  export DSQL_ENDPOINT_PARAM="/armoury/sandbox/${SERVICE_SHORT_NAME}/dsql-cluster-endpoint"
                  serverless deploy --stage pr-${{ github.event.pull_request.number }}

    deploy-production:
        name: Deploy Production
        needs: ci
        if: vars.DEPLOY_ENABLED == 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        runs-on: ubuntu-latest
        environment: production
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc
                  cache: npm

            - run: npm ci

            - name: Build dependencies
              if: inputs.needs-shared-build
              run: npx turbo run build --filter=${{ inputs.service-name }}^...

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v6
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

            - name: Fetch DSQL config from SSM
              run: |
                  SERVICE_SHORT_NAME=$(basename "${{ inputs.working-directory }}")
                  DSQL_CLUSTER_ENDPOINT=$(aws ssm get-parameter \
                    --name "/armoury/production/${SERVICE_SHORT_NAME}/dsql-cluster-endpoint" \
                    --query 'Parameter.Value' --output text)
                  echo "DSQL_CLUSTER_ENDPOINT=${DSQL_CLUSTER_ENDPOINT}" >> "${GITHUB_ENV}"
                  echo "DSQL_REGION=${{ vars.AWS_REGION || 'us-east-1' }}" >> "${GITHUB_ENV}"

            - name: Generate DATABASE_URL for production migrations
              id: db-url-prod
              if: inputs.has-migrations
              run: |
                  DATABASE_URL=$(node --import=tsx src/services/__testing__/dbSchema.ts url "public")
                  {
                    echo "DATABASE_URL<<DBURL_EOF"
                    echo "${DATABASE_URL}"
                    echo "DBURL_EOF"
                  } >> "${GITHUB_OUTPUT}"

            - name: Run migrations
              if: inputs.has-migrations
              env:
                  DB_SCHEMA: public
                  DATABASE_URL: ${{ steps.db-url-prod.outputs.DATABASE_URL || '' }}
              run: npm run db:migrate -w ${{ inputs.service-name }}

            - name: Install Serverless Framework
              run: npm install -g serverless

            - name: Deploy
              working-directory: ${{ inputs.working-directory }}
              env:
                  DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
                  ACM_CERTIFICATE_ARN: ${{ secrets.ACM_CERTIFICATE_ARN }}
                  ROUTE53_HOSTED_ZONE_ID: ${{ vars.ROUTE53_HOSTED_ZONE_ID }}
                  CUSTOM_DOMAIN_ENABLED: 'true'
                  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
              run: serverless deploy --stage production
