name: Deploy Service

on:
    workflow_call:
        inputs:
            service-name:
                description: 'npm workspace package name (e.g. @armoury/campaigns)'
                required: true
                type: string
            working-directory:
                description: 'Path to the service directory (e.g. src/services/campaigns)'
                required: true
                type: string
            needs-shared-build:
                description: 'Whether to build shared dependencies before CI steps'
                required: false
                type: boolean
                default: false
            has-migrations:
                description: 'Whether the service has a db:migrate script to run before deploy'
                required: false
                type: boolean
                default: false
            authorizer-arn:
                description: 'Lambda authorizer ARN (resolved by the orchestrator workflow after deploying the authorizer service)'
                required: false
                type: string
                default: ''
            service-short-name:
                description: 'Short service name used for routing (e.g. users, campaigns, matches, friends). Empty = skip routing rule creation.'
                required: false
                type: string
                default: ''
            has-websocket:
                description: 'Whether the service has a WebSocket API that needs a WS domain mapping'
                required: false
                type: boolean
                default: false
            routing-rule-priority:
                description: 'Base priority for this service routing rule (unique per service, 1-999999). Required if service-short-name is set.'
                required: false
                type: number
                default: 0
            sentry-project:
                description: 'Sentry project slug for release tracking and source map uploads (e.g. armoury-campaigns). Empty = skip Sentry release steps.'
                required: false
                type: string
                default: ''

jobs:
    ci:
        name: Build & Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc
                  cache: npm

            - run: npm ci

            - name: Build dependencies
              if: inputs.needs-shared-build
              run: npx turbo run build generate:types --filter=${{ inputs.service-name }}^...

            - name: Typecheck
              run: npx turbo run typecheck --filter=${{ inputs.service-name }}

            - name: Lint
              run: npm run lint -w ${{ inputs.service-name }}

            - name: Format check
              run: npm run format:check -w ${{ inputs.service-name }}

            - name: Test
              run: npx turbo run test --filter=${{ inputs.service-name }}

    deploy-sandbox:
        name: Deploy Sandbox
        needs: ci
        if: vars.DEPLOY_ENABLED == 'true' && github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        environment: sandbox
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc
                  cache: npm

            - run: npm ci

            - name: Build dependencies
              if: inputs.needs-shared-build
              run: npx turbo run build --filter=${{ inputs.service-name }}^...

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v6
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

            - name: Fetch Sentry DSN from SSM
              if: inputs.sentry-project != ''
              run: |
                  SERVICE_SHORT_NAME=$(basename "${{ inputs.working-directory }}")
                  SENTRY_DSN=$(aws ssm get-parameter \
                    --name "/armoury/sandbox/${SERVICE_SHORT_NAME}/sentry-dsn" \
                    --with-decryption \
                    --query 'Parameter.Value' --output text 2>/dev/null || true)
                  if [ -n "${SENTRY_DSN}" ]; then
                    echo "::add-mask::${SENTRY_DSN}"
                    echo "SENTRY_DSN=${SENTRY_DSN}" >> "${GITHUB_ENV}"
                  else
                    echo "::warning::Sentry DSN not found in SSM for ${SERVICE_SHORT_NAME} — Sentry will be disabled"
                  fi
                  echo "SENTRY_RELEASE=${{ inputs.sentry-project }}@${{ github.sha }}" >> "${GITHUB_ENV}"

            - name: Fetch Sentry auth token from SSM
              if: inputs.sentry-project != '' && env.SENTRY_DSN != ''
              run: |
                  SENTRY_AUTH_TOKEN=$(aws ssm get-parameter \
                    --name "/armoury/global/sentry-auth-token" \
                    --with-decryption \
                    --query 'Parameter.Value' --output text 2>/dev/null || true)
                  if [ -n "${SENTRY_AUTH_TOKEN}" ]; then
                    echo "::add-mask::${SENTRY_AUTH_TOKEN}"
                    echo "SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN}" >> "${GITHUB_ENV}"
                  else
                    echo "::warning::Sentry auth token not found in SSM — source map upload will be skipped"
                  fi
            - name: Fetch DSQL config and generate token
              if: inputs.has-migrations
              run: |
                  SERVICE_SHORT_NAME=$(basename "${{ inputs.working-directory }}")
                  DSQL_CLUSTER_ENDPOINT=$(aws ssm get-parameter \
                    --name "/armoury/sandbox/${SERVICE_SHORT_NAME}/dsql-cluster-endpoint" \
                    --query 'Parameter.Value' --output text)
                  DSQL_REGION="${{ vars.AWS_REGION || 'us-east-1' }}"
                  DSQL_TOKEN=$(node --import=tsx src/shared/e2e/src/dbSchema.ts token "${DSQL_REGION}" "${DSQL_CLUSTER_ENDPOINT}")
                  echo "DSQL_CLUSTER_ENDPOINT=${DSQL_CLUSTER_ENDPOINT}" >> "${GITHUB_ENV}"
                  echo "DSQL_REGION=${DSQL_REGION}" >> "${GITHUB_ENV}"
                  echo "::add-mask::${DSQL_TOKEN}"
                  echo "DSQL_TOKEN=${DSQL_TOKEN}" >> "${GITHUB_ENV}"

            - name: Create PR schema
              if: inputs.has-migrations && github.event_name == 'pull_request'
              env:
                  DB_SCHEMA: ${{ format('pr_{0}', github.event.pull_request.number) }}
              run: node --import=tsx src/shared/e2e/src/dbSchema.ts create "${DB_SCHEMA}"

            - name: Run migrations
              if: inputs.has-migrations
              env:
                  DB_SCHEMA: ${{ github.event_name == 'pull_request' && format('pr_{0}', github.event.pull_request.number) || 'public' }}
              run: npm run db:migrate -w ${{ inputs.service-name }}

            - name: Set Authorizer ARN
              if: inputs.authorizer-arn != ''
              run: |
                  echo "AUTHORIZER_ARN=${{ inputs.authorizer-arn }}" >> "${GITHUB_ENV}"
                  echo "Using Authorizer ARN passed from orchestrator"

            - name: Install Serverless Framework
              run: npm install -g serverless

            - name: Deploy
              working-directory: ${{ inputs.working-directory }}
              env:
                  DB_SCHEMA: ${{ format('pr_{0}', github.event.pull_request.number) }}
                  SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
                  AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
                  AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}
                  SENTRY_DSN: ${{ env.SENTRY_DSN }}
                  SENTRY_RELEASE: ${{ env.SENTRY_RELEASE }}
                  ALLOWED_ORIGIN: ${{ format('https://pr-{0}.sandbox.armoury-app.com', github.event.pull_request.number) }}
              run: |
                  SERVICE_SHORT_NAME=$(basename "${{ inputs.working-directory }}")
                  export DSQL_ENDPOINT_PARAM="/armoury/sandbox/${SERVICE_SHORT_NAME}/dsql-cluster-endpoint"

                  DEPLOY_ARGS="--stage pr-${{ github.event.pull_request.number }}"
                  if [[ -n "${AUTHORIZER_ARN:-}" ]]; then
                    DEPLOY_ARGS="${DEPLOY_ARGS} --param=\"authorizerArn=${AUTHORIZER_ARN}\""
                  fi

                  serverless deploy ${DEPLOY_ARGS}

            - name: Create Sentry release and upload source maps
              if: inputs.sentry-project != '' && env.SENTRY_DSN != '' && env.SENTRY_AUTH_TOKEN != ''
              working-directory: ${{ inputs.working-directory }}
              env:
                  SENTRY_AUTH_TOKEN: ${{ env.SENTRY_AUTH_TOKEN }}
                  SENTRY_ORG: black-lab
              run: |
                  npx @sentry/cli releases new "${{ env.SENTRY_RELEASE }}" --project "${{ inputs.sentry-project }}"
                  npx @sentry/cli releases set-commits "${{ env.SENTRY_RELEASE }}" --auto --project "${{ inputs.sentry-project }}"
                  npx @sentry/cli sourcemaps upload .serverless/ --release "${{ env.SENTRY_RELEASE }}" --project "${{ inputs.sentry-project }}"
                  npx @sentry/cli releases finalize "${{ env.SENTRY_RELEASE }}"

            - name: Create HTTP API routing rule
              if: github.event_name == 'pull_request' && inputs.service-short-name != ''
              env:
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  SERVICE_SHORT_NAME: ${{ inputs.service-short-name }}
                  BASE_PRIORITY: ${{ inputs.routing-rule-priority }}
                  WILDCARD_DOMAIN: '*.api.sandbox.armoury-app.com'
              run: |
                  # Compute a unique priority per PR to avoid collisions between concurrent PRs.
                  # Each service has a unique base priority (1-999); adding PR_NUMBER * 1000
                  # gives each PR its own priority band (e.g. PR 42 + base 100 = 42100).
                  PRIORITY=$((PR_NUMBER * 1000 + BASE_PRIORITY))
                  STACK_NAME="armoury-${SERVICE_SHORT_NAME}-pr-${PR_NUMBER}"

                  # Get HTTP API ID from CloudFormation output (Serverless Framework exports HttpApiId)
                  HTTP_API_ID=$(aws cloudformation describe-stacks \
                    --stack-name "${STACK_NAME}" \
                    --query 'Stacks[0].Outputs[?OutputKey==`HttpApiId`].OutputValue' \
                    --output text || true)

                  # Fallback: get HTTP API ID from CloudFormation resource
                  if [ -z "${HTTP_API_ID}" ] || [ "${HTTP_API_ID}" = "None" ]; then
                    HTTP_API_ID=$(aws cloudformation describe-stack-resource \
                      --stack-name "${STACK_NAME}" \
                      --logical-resource-id HttpApi \
                      --query 'StackResourceDetail.PhysicalResourceId' \
                      --output text)
                  fi

                  echo "HTTP API ID: ${HTTP_API_ID}"

                  # Delete existing routing rule for this PR+service if it exists
                  EXISTING_RULE_ARN=$(aws apigatewayv2 list-routing-rules \
                    --domain-name "${WILDCARD_DOMAIN}" \
                    --output json \
                    | jq -r ".RoutingRules[] | select(.Priority == ${PRIORITY}) | .RoutingRuleArn" || true)

                  if [ -n "${EXISTING_RULE_ARN}" ] && [ "${EXISTING_RULE_ARN}" != "None" ] && [ "${EXISTING_RULE_ARN}" != "null" ]; then
                    EXISTING_RULE_ID=$(echo "${EXISTING_RULE_ARN}" | grep -oP '[^/]+$')
                    echo "Deleting existing routing rule: ${EXISTING_RULE_ID}"
                    aws apigatewayv2 delete-routing-rule \
                      --domain-name "${WILDCARD_DOMAIN}" \
                      --routing-rule-id "${EXISTING_RULE_ID}"
                  fi

                  # Create routing rule: Host header match + base path match -> HTTP API
                  aws apigatewayv2 create-routing-rule \
                    --domain-name "${WILDCARD_DOMAIN}" \
                    --priority "${PRIORITY}" \
                    --conditions '[
                      {
                        "MatchHeaders": {
                          "AnyOf": [{
                            "Header": "Host",
                            "ValueGlob": "'"pr-${PR_NUMBER}.api.sandbox.armoury-app.com"'"
                          }]
                        }
                      },
                      {
                        "MatchBasePaths": {
                          "AnyOf": ["'"${SERVICE_SHORT_NAME}"'"]
                        }
                      }
                    ]' \
                    --actions '[{
                      "InvokeApi": {
                        "ApiId": "'"${HTTP_API_ID}"'",
                        "Stage": "$default",
                        "StripBasePath": false
                      }
                    }]'

                  echo "Created routing rule for pr-${PR_NUMBER}.api.sandbox.armoury-app.com/${SERVICE_SHORT_NAME} -> ${HTTP_API_ID}"

            - name: Create WS domain mapping
              if: github.event_name == 'pull_request' && inputs.has-websocket
              env:
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  SERVICE_SHORT_NAME: ${{ inputs.service-short-name }}
                  WS_DOMAIN: 'ws-sandbox.armoury-app.com'
              run: |
                  STACK_NAME="armoury-${SERVICE_SHORT_NAME}-pr-${PR_NUMBER}"

                  # Get WebSocket API ID from CloudFormation
                  WS_API_ID=$(aws cloudformation describe-stack-resource \
                    --stack-name "${STACK_NAME}" \
                    --logical-resource-id WebsocketsApi \
                    --query 'StackResourceDetail.PhysicalResourceId' \
                    --output text)

                  echo "WebSocket API ID: ${WS_API_ID}"

                  # Serialize WS domain creation to avoid API Gateway rate limits (1 per 30s).
                  # The GitHub concurrency group ensures only one WS mapping runs at a time.
                  # Sleep briefly to respect the rate limit window from any prior creation.
                  sleep 5

                  # Create API mapping: ws-sandbox.armoury-app.com/pr-{N}-{service} -> WS API
                  # Include PR number in mapping key to avoid collisions between concurrent PRs.
                  aws apigatewayv2 create-api-mapping \
                    --domain-name "${WS_DOMAIN}" \
                    --api-id "${WS_API_ID}" \
                    --stage "pr-${PR_NUMBER}" \
                    --api-mapping-key "pr-${PR_NUMBER}-${SERVICE_SHORT_NAME}" || echo "::warning::WS API mapping creation failed (may already exist)"

                  echo "Created WS API mapping for ws-sandbox.armoury-app.com/pr-${PR_NUMBER}-${SERVICE_SHORT_NAME} -> ${WS_API_ID}"

    deploy-production:
        name: Deploy Production
        needs: ci
        if: vars.DEPLOY_ENABLED == 'true' && github.ref == 'refs/heads/main' && github.event_name == 'push'
        runs-on: ubuntu-latest
        environment: production
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc
                  cache: npm

            - run: npm ci

            - name: Build dependencies
              if: inputs.needs-shared-build
              run: npx turbo run build --filter=${{ inputs.service-name }}^...

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v6
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

            - name: Fetch Sentry DSN from SSM
              if: inputs.sentry-project != ''
              run: |
                  SERVICE_SHORT_NAME=$(basename "${{ inputs.working-directory }}")
                  SENTRY_DSN=$(aws ssm get-parameter \
                    --name "/armoury/production/${SERVICE_SHORT_NAME}/sentry-dsn" \
                    --with-decryption \
                    --query 'Parameter.Value' --output text 2>/dev/null || true)
                  if [ -n "${SENTRY_DSN}" ]; then
                    echo "::add-mask::${SENTRY_DSN}"
                    echo "SENTRY_DSN=${SENTRY_DSN}" >> "${GITHUB_ENV}"
                  else
                    echo "::warning::Sentry DSN not found in SSM for ${SERVICE_SHORT_NAME} — Sentry will be disabled"
                  fi
                  echo "SENTRY_RELEASE=${{ inputs.sentry-project }}@${{ github.sha }}" >> "${GITHUB_ENV}"

            - name: Fetch Sentry auth token from SSM
              if: inputs.sentry-project != '' && env.SENTRY_DSN != ''
              run: |
                  SENTRY_AUTH_TOKEN=$(aws ssm get-parameter \
                    --name "/armoury/global/sentry-auth-token" \
                    --with-decryption \
                    --query 'Parameter.Value' --output text 2>/dev/null || true)
                  if [ -n "${SENTRY_AUTH_TOKEN}" ]; then
                    echo "::add-mask::${SENTRY_AUTH_TOKEN}"
                    echo "SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN}" >> "${GITHUB_ENV}"
                  else
                    echo "::warning::Sentry auth token not found in SSM — source map upload will be skipped"
                  fi

            - name: Fetch DSQL config and generate token
              if: inputs.has-migrations
              run: |
                  SERVICE_SHORT_NAME=$(basename "${{ inputs.working-directory }}")
                  DSQL_CLUSTER_ENDPOINT=$(aws ssm get-parameter \
                    --name "/armoury/production/${SERVICE_SHORT_NAME}/dsql-cluster-endpoint" \
                    --query 'Parameter.Value' --output text)
                  DSQL_REGION="${{ vars.AWS_REGION || 'us-east-1' }}"
                  DSQL_TOKEN=$(node --import=tsx src/shared/e2e/src/dbSchema.ts token "${DSQL_REGION}" "${DSQL_CLUSTER_ENDPOINT}")
                  echo "DSQL_CLUSTER_ENDPOINT=${DSQL_CLUSTER_ENDPOINT}" >> "${GITHUB_ENV}"
                  echo "DSQL_REGION=${DSQL_REGION}" >> "${GITHUB_ENV}"
                  echo "::add-mask::${DSQL_TOKEN}"
                  echo "DSQL_TOKEN=${DSQL_TOKEN}" >> "${GITHUB_ENV}"

            - name: Run migrations
              if: inputs.has-migrations
              env:
                  DB_SCHEMA: public
              run: npm run db:migrate -w ${{ inputs.service-name }}

            - name: Set Authorizer ARN
              if: inputs.authorizer-arn != ''
              run: |
                  echo "AUTHORIZER_ARN=${{ inputs.authorizer-arn }}" >> "${GITHUB_ENV}"
                  echo "Using Authorizer ARN passed from orchestrator"

            - name: Install Serverless Framework
              run: npm install -g serverless

            - name: Deploy
              working-directory: ${{ inputs.working-directory }}
              env:
                  SERVERLESS_ACCESS_KEY: ${{ secrets.SERVERLESS_ACCESS_KEY }}
                  AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
                  AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}
                  SENTRY_DSN: ${{ env.SENTRY_DSN }}
                  SENTRY_RELEASE: ${{ env.SENTRY_RELEASE }}
                  ALLOWED_ORIGIN: ${{ format('https://{0}', vars.DOMAIN_NAME) }}
              run: |
                  DEPLOY_ARGS="--stage production"
                  if [[ -n "${AUTHORIZER_ARN:-}" ]]; then
                    DEPLOY_ARGS="${DEPLOY_ARGS} --param=\"authorizerArn=${AUTHORIZER_ARN}\""
                  fi

                  serverless deploy ${DEPLOY_ARGS}

            - name: Create Sentry release and upload source maps
              if: inputs.sentry-project != '' && env.SENTRY_DSN != '' && env.SENTRY_AUTH_TOKEN != ''
              working-directory: ${{ inputs.working-directory }}
              env:
                  SENTRY_AUTH_TOKEN: ${{ env.SENTRY_AUTH_TOKEN }}
                  SENTRY_ORG: black-lab
              run: |
                  npx @sentry/cli releases new "${{ env.SENTRY_RELEASE }}" --project "${{ inputs.sentry-project }}"
                  npx @sentry/cli releases set-commits "${{ env.SENTRY_RELEASE }}" --auto --project "${{ inputs.sentry-project }}"
                  npx @sentry/cli sourcemaps upload .serverless/ --release "${{ env.SENTRY_RELEASE }}" --project "${{ inputs.sentry-project }}"
                  npx @sentry/cli releases finalize "${{ env.SENTRY_RELEASE }}"
            - name: Create HTTP API mapping
              if: inputs.service-short-name != ''
              env:
                  SERVICE_SHORT_NAME: ${{ inputs.service-short-name }}
                  PRODUCTION_DOMAIN: 'api.armoury-app.com'
              run: |
                  STACK_NAME="armoury-${SERVICE_SHORT_NAME}-production"

                  # Get HTTP API ID from CloudFormation output (Serverless Framework exports HttpApiId)
                  HTTP_API_ID=$(aws cloudformation describe-stacks \
                    --stack-name "${STACK_NAME}" \
                    --query 'Stacks[0].Outputs[?OutputKey==`HttpApiId`].OutputValue' \
                    --output text || true)

                  # Fallback: get HTTP API ID from CloudFormation resource
                  if [ -z "${HTTP_API_ID}" ] || [ "${HTTP_API_ID}" = "None" ]; then
                    HTTP_API_ID=$(aws cloudformation describe-stack-resource \
                      --stack-name "${STACK_NAME}" \
                      --logical-resource-id HttpApi \
                      --query 'StackResourceDetail.PhysicalResourceId' \
                      --output text)
                  fi

                  echo "HTTP API ID: ${HTTP_API_ID}"

                  # Delete existing API mapping for this service if it exists
                  EXISTING_MAPPING_ID=$(aws apigatewayv2 get-api-mappings \
                    --domain-name "${PRODUCTION_DOMAIN}" \
                    --query "Items[?ApiMappingKey=='${SERVICE_SHORT_NAME}'].ApiMappingId" \
                    --output text 2>/dev/null || true)

                  if [ -n "${EXISTING_MAPPING_ID}" ] && [ "${EXISTING_MAPPING_ID}" != "None" ]; then
                    echo "Updating existing API mapping ${EXISTING_MAPPING_ID}"
                    aws apigatewayv2 delete-api-mapping \
                      --domain-name "${PRODUCTION_DOMAIN}" \
                      --api-mapping-id "${EXISTING_MAPPING_ID}"
                  fi

                  # Create API mapping: api.armoury-app.com/{service} -> HTTP API $default stage
                  aws apigatewayv2 create-api-mapping \
                    --domain-name "${PRODUCTION_DOMAIN}" \
                    --api-id "${HTTP_API_ID}" \
                    --stage "\$default" \
                    --api-mapping-key "${SERVICE_SHORT_NAME}"

                  echo "Created API mapping for api.armoury-app.com/${SERVICE_SHORT_NAME} -> ${HTTP_API_ID}"
            - name: Create WS API mapping
              if: inputs.has-websocket
              env:
                  SERVICE_SHORT_NAME: ${{ inputs.service-short-name }}
                  WS_DOMAIN: 'ws.armoury-app.com'
              run: |
                  STACK_NAME="armoury-${SERVICE_SHORT_NAME}-production"

                  WS_API_ID=$(aws cloudformation describe-stack-resource \
                    --stack-name "${STACK_NAME}" \
                    --logical-resource-id WebsocketsApi \
                    --query 'StackResourceDetail.PhysicalResourceId' \
                    --output text)

                  echo "WebSocket API ID: ${WS_API_ID}"

                  # Delete existing WS API mapping for this service if it exists
                  EXISTING_MAPPING_ID=$(aws apigatewayv2 get-api-mappings \
                    --domain-name "${WS_DOMAIN}" \
                    --query "Items[?ApiMappingKey=='${SERVICE_SHORT_NAME}'].ApiMappingId" \
                    --output text 2>/dev/null || true)

                  if [ -n "${EXISTING_MAPPING_ID}" ] && [ "${EXISTING_MAPPING_ID}" != "None" ]; then
                    echo "Deleting existing WS API mapping ${EXISTING_MAPPING_ID}"
                    aws apigatewayv2 delete-api-mapping \
                      --domain-name "${WS_DOMAIN}" \
                      --api-mapping-id "${EXISTING_MAPPING_ID}"
                  fi

                  aws apigatewayv2 create-api-mapping \
                    --domain-name "${WS_DOMAIN}" \
                    --api-id "${WS_API_ID}" \
                    --stage "production" \
                    --api-mapping-key "${SERVICE_SHORT_NAME}"

                  echo "Created WS API mapping for ws.armoury-app.com/${SERVICE_SHORT_NAME} -> ${WS_API_ID}"
