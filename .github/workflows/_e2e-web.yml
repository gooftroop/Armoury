name: Web E2E

on:
    workflow_call:

permissions:
    contents: read

jobs:
    e2e:
        name: Playwright
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version-file: .nvmrc
                  cache: npm

            - run: npm ci

            - name: Cache Playwright browsers
              id: playwright-cache
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

            - name: Install Playwright browsers
              if: steps.playwright-cache.outputs.cache-hit != 'true'
              run: npx playwright install --with-deps chromium

            - name: Install Playwright system deps
              if: steps.playwright-cache.outputs.cache-hit == 'true'
              run: npx playwright install-deps chromium

            - name: Pre-pull Docker images
              run: |
                  docker pull localstack/localstack:4.4.0 &
                  docker pull postgres:16-alpine &
                  wait

            - name: Ensure clean Docker state
              run: |
                  docker compose -f infra/localstack/docker-compose.yml down -v --remove-orphans 2>/dev/null || true
                  shopt -s nullglob
                  for f in src/services/*/docker-compose.yml src/shared/*/docker-compose.yml src/shared/*/*/docker-compose.yml; do
                      dir=$(dirname "$f")
                      docker compose -f "$f" --project-directory "$dir" down -v --remove-orphans 2>/dev/null || true
                  done
                  shopt -u nullglob

            - name: Start LocalStack
              run: docker compose -f infra/localstack/docker-compose.yml up -d --wait

            - name: Start per-service databases
              run: |
                  shopt -s nullglob
                  for f in src/services/*/docker-compose.yml; do
                      dir=$(dirname "$f")
                      docker compose -f "$f" --project-directory "$dir" up -d --wait
                  done
                  shopt -u nullglob

            - name: Build dependencies
              run: npx turbo run build --filter=@armoury/web^...

            - name: Install awslocal CLI
              run: pip install awscli-local

            - name: Build services and bootstrap LocalStack
              run: bash infra/localstack/bootstrap.sh

            - name: Run e2e tests
              run: npx playwright test --config src/web/e2e/playwright.config.ts
              env:
                  CI: 'true'
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
                  AUTH0_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
                  AUTH0_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
                  AUTH0_SECRET: ${{ secrets.AUTH0_SECRET }}
                  E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
                  E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}

            - name: Upload test artifacts
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: |
                      playwright-report/
                      test-results/
                  retention-days: 7

            - name: Cleanup Docker containers
              if: always()
              run: |
                  docker compose -f infra/localstack/docker-compose.yml down -v --remove-orphans 2>/dev/null || true
                  shopt -s nullglob
                  for f in src/services/*/docker-compose.yml src/shared/*/docker-compose.yml src/shared/*/*/docker-compose.yml; do
                      dir=$(dirname "$f")
                      docker compose -f "$f" --project-directory "$dir" down -v --remove-orphans 2>/dev/null || true
                  done
                  shopt -u nullglob
