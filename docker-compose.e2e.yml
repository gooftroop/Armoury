services:
    matches-db:
        image: postgres:16-alpine
        container_name: armoury-e2e-matches
        ports:
            - '5433:5432'
        environment:
            POSTGRES_DB: armoury_matches
            POSTGRES_USER: armoury
            POSTGRES_PASSWORD: armoury_local
        volumes:
            - ./src/services/matches/__fixtures__/seed.sql:/docker-entrypoint-initdb.d/seed.sql
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U armoury -d armoury_matches']
            interval: 3s
            timeout: 3s
            retries: 10

